lockfileVersion: '9.0'

settings:
  autoInstallPeers: true
  excludeLinksFromLockfile: false

importers:

  .: {}

  apps/api:
    dependencies:
      '@asad/prompts':
        specifier: workspace:*
        version: link:../../packages/prompts
      '@asad/renderer':
        specifier: workspace:*
        version: link:../../packages/renderer
      '@asad/schemas':
        specifier: workspace:*
        version: link:../../packages/schemas
      '@asad/worker':
        specifier: workspace:*
        version: link:../worker
    devDependencies:
      typescript:
        specifier: ^5.8.2
        version: 5.9.3

  apps/worker:
    dependencies:
      '@asad/prompts':
        specifier: workspace:*
        version: link:../../packages/prompts
      '@asad/renderer':
        specifier: workspace:*
        version: link:../../packages/renderer
      '@asad/schemas':
        specifier: workspace:*
        version: link:../../packages/schemas
    devDependencies:
      typescript:
        specifier: ^5.8.2
        version: 5.9.3

  packages/prompts:
    dependencies:
      '@asad/schemas':
        specifier: workspace:*
        version: link:../schemas
    devDependencies:
      typescript:
        specifier: ^5.8.2
        version: 5.9.3

  packages/renderer:
    dependencies:
      '@asad/schemas':
        specifier: workspace:*
        version: link:../schemas
    devDependencies:
      typescript:
        specifier: ^5.8.2
        version: 5.9.3

  packages/schemas:
    dependencies:
      zod:
        specifier: ^3.24.2
        version: 3.25.76
    devDependencies:
      typescript:
        specifier: ^5.8.2
        version: 5.9.3

